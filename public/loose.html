<!DOCTYPE html>
<html>
    <head>
        <script src="/js/aframe.min.js"></script> <!-- https://github.com/aframevr/aframe -->  
        <script src="/js/cursor-listener.js"></script>
    </head>
    <body>

        <a-scene shadow="type:basic;">
            <a-assets timeout="5000">
                <!--LOADING ASSETS ITEM-->
                <a-asset-item id="loose-obj" src="/assets/models/loadingscreen/loose/loose.obj"></a-asset-item>
                <img id="loose-mtl" src="/assets/models/loadingscreen/loose/Diffuse.jpg"></img>

                <a-asset-item id="comp-obj" src="/assets/models/loadingscreen/loose/comp.obj"></a-asset-item>

                <a-asset-item id="coop-obj" src="/assets/models/loadingscreen/loose/coop.obj"></a-asset-item>
            </a-assets>



                        <!--CAMERA CONTROLS-->
                        <a-entity id="mainCamera" position="0 20 90"   camera look-controls wasd-controls="acceleration: 200">
                                        <a-entity cursor="fuse:false, fuseTimeout:1000; rayOrigin:mouse"
                                                        position="0 0 -1"
                                                        geometry="primitive:ring; radiusInner:0.02; radiusOuter:0.03;"
                                                        material="shader:flat; color:black">
                                        </a-entity>
                        </a-entity>


                        <!--LIGHTING-->
                        <a-entity light="type:hemisphere; intensity:0.6; shadowBias:-0.000001; shadowMapWidth:1024; shadowMapHeight:1024;" position="-0.5 1 1"></a-entity>
                        <a-entity light="type: ambient; intensity: 0.9; color:#bbb;"></a-entity>
                        
                        <!--CREATE-->
                        <a-obj-model load-environment src="#loose-obj" material="src:#loose-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                        <a-obj-model id="cooper" load-environment src="#coop-obj" material="src:#loose-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                        <a-obj-model id="compet" load-environment src="#comp-obj" material="src:#loose-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
    </a-scene>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = io();

        //default connect event
        socket.on('connect', function() {
            console.log("reconnected!");
        });


                //LOADING SCREENS
        document.querySelector('#compet').addEventListener('click', function() {
                console.log("competitive clicked!");             
                window.location.href = 'controller.html';
       
            });
        
        document.querySelector('#compet').addEventListener('click', function() {
                console.log("competitive clicked!");             
                window.location.href = 'controller.html';
       
            });

         

        

         









    </script>
    
    </body>
</html>
