<!DOCTYPE html>
<html>
	<head>
		<title>Sushi バー</title>
    <script src="/js/aframe.min.js"></script> <!-- https://github.com/aframevr/aframe -->
		<script src="/js/spherical-env-map.js"></script> <!-- https://github.com/aframevr/aframe -->
    <script src="/js/load-environment.js"></script>
    
  </head>
        <body>
            <h1>This Player picks a card</h1>
            <script src="/socket.io/socket.io.js"></script>
            <script>
                let socket = io();
    
                //default connect event
                socket.on('connect', function() {
                    console.log("connected!");
                });
            </script>

            <a-scene shadow="type:basic;">
                    <a-assets timeout="5000">
                        <!--LOADING ASSETS ITEM-->

                        <!-- <a-asset-item id="room-obj" src="/assets/models/room/room.obj"></a-asset-item>
                        <img id="room-mtl" src="/assets/models/room/swatches.jpg"></img> -->

                        <a-asset-item id="setting-fbx" src="/assets/models/"></a-asset-item>
                        <img id="chopsticks-mtl" src="/assets/models/environment/chopsticks_Base_Color.png"></img>

                        <a-asset-item id="card1-obj" src="/assets/models/cards/ace.obj"></a-asset-item>
                        <img id="card1-mtl" src="/assets/models/cards/ace.jpg"></img>

                        <a-asset-item id="card2-obj" src="/assets/models/cards/eight.obj"></a-asset-item>
                        <img id="card2-mtl" src="/assets/models/cards/eight.jpg"></img>

                        <a-asset-item id="card3-obj" src="/assets/models/cards/five.obj"></a-asset-item>
                        <img id="card3-mtl" src="/assets/models/cards/five.jpg"></img>

                        <a-asset-item id="card4-obj" src="/assets/models/cards/jack.obj"></a-asset-item>
                        <img id="card4-mtl" src="/assets/models/cards/jack.jpg"></img>

                        <a-asset-item id="card5-obj" src="/assets/models/cards/jack1.obj"></a-asset-item>
                        <img id="card5-mtl" src="/assets/models/cards/jack1.jpg"></img>

                        <a-asset-item id="card6-obj" src="/assets/models/cards/king.obj"></a-asset-item>
                        <img id="card6-mtl" src="/assets/models/cards/king.jpg"></img>

                        <a-asset-item id="card7-obj" src="/assets/models/cards/queen.obj"></a-asset-item>
                        <img id="card7-mtl" src="/assets/models/cards/queen.jpg"></img>
                        
                        <a-asset-item id="card8-obj" src="/assets/models/cards/two.obj"></a-asset-item>
                        <img id="card8-mtl" src="/assets/models/cards/two.jpg"></img>




		</a-assets>
                <!--CAMERA CONTROLS-->
                <a-entity id="mainCamera" position="0 40 -1"  camera look-controls wasd-controls="acceleration: 2000">
								<a-entity cursor="fuse:false, fuseTimeout:1000; rayOrigin:mouse"
												position="0 0 -1"
												geometry="primitive:ring; radiusInner:0.02; radiusOuter:0.03;"
												material="shader:flat; color:black">
								</a-entity>
                </a-entity>


                <!--LIGHTING-->
                <a-entity light="type:directional; castShadow:true; intensity:0.6; shadowBias:-0.000001; shadowMapWidth:1024; shadowMapHeight:1024;" position="-0.5 1 1"></a-entity>
                <a-entity light="type: ambient; intensity: 0.9; color:#bbb;"></a-entity>
                
                <!--CREATE-->
                <a-obj-model load-environment src="#room-obj" material="src:#room-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:false; receive:false;" spherical-env-map="src:#skymap;"></a-obj-model>
                                <a-obj-model load-environment src="#card1-obj" material="src:#card1-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                                <a-obj-model load-environment src="#card2-obj" material="src:#card2-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                                <a-obj-model load-environment src="#card3-obj" material="src:#card3-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                                <a-obj-model load-environment src="#card4-obj" material="src:#card4-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                                <a-obj-model load-environment src="#card5-obj" material="src:#card5-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                                <a-obj-model load-environment src="#card6-obj" material="src:#card6-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                                <a-obj-model load-environment src="#card7-obj" material="src:#card7-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                                <a-obj-model load-environment src="#card8-obj" material="src:#card8-mtl" position="0 0 0" rotation="0 0 0" scale="1 1 1" shadow="cast:true; receive:true;" spherical-env-map="src:#skymap;"></a-obj-model>
                                
  
            

                <a-entity id="sky"
                    geometry="primitive:sphere; radius:500;"
                    material="shader:flat; src:#skymap;  aside:back; height:2048; width:2048">
                </a-entity>
            </a-scene>
		</body>
	</head>
</html>
